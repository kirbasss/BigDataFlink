services:
  postgres:
    image: postgres:16
    container_name: lab3-postgres
    environment:
      POSTGRES_DB: lab3
      POSTGRES_USER: flink
      POSTGRES_PASSWORD: flink
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flink -d lab3"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:4.1.1
    container_name: lab3-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:29092,PLAINTEXT_HOST://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:29092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  jobmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    container_name: lab3-flink-jobmanager
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: jobmanager
    environment:
      JOB_MANAGER_RPC_ADDRESS: jobmanager
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: petshop_sales
      JDBC_URL: jdbc:postgresql://postgres:5432/lab3
      JDBC_USER: flink
      JDBC_PASSWORD: flink
    ports:
      - "8081:8081"

  taskmanager:
    build:
      context: .
      dockerfile: Dockerfile.flink
    container_name: lab3-flink-taskmanager
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      JOB_MANAGER_RPC_ADDRESS: jobmanager
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: petshop_sales
      JDBC_URL: jdbc:postgresql://postgres:5432/lab3
      JDBC_USER: flink
      JDBC_PASSWORD: flink

  producer:
    build:
      context: .
      dockerfile: Dockerfile.producer
    container_name: lab3-kafka-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: petshop_sales
      INPUT_DIR: /app/data
      SEND_DELAY_MS: 25
    restart: "no"

volumes:
  postgres_data:
